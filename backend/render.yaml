# Render deployment config for backend
# Deploy from Render Dashboard: New → Blueprint → Connect repo
services:
  - type: web
    name: ai-visual-assistant-api
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
